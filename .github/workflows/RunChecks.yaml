# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: main
  pull_request:
    branches: main

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: '4.5'}
          - {os: windows-latest, r: '4.5'}
          - {os: ubuntu-latest,  r: '4.5'}
          - {os: ubuntu-latest,  r: '4.4'}
          - {os: ubuntu-latest,  r: '4.3'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true
  
      - name: Download mocked binaries
        run: |
          mkdir -p /usr/local/bin
          cd /tmp
          gh release download "sinfo/v0.2.1" -R a2-ai-tech-training/slurm-mocks -p "*Linux_x86_64.tar.gz" -D /usr/local/bin/
          tar -xvf /usr/local/bin/sinfo_Linux_x86_64.tar.gz
          mv ./sinfo /usr/local/bin/sinfo
          chmod 755 /usr/local/bin/sinfo

          gh release download "sacct/v0.2.0" -R a2-ai-tech-training/slurm-mocks -p "*Linux_x86_64.tar.gz" -D /usr/local/bin/
          tar -xvf /usr/local/bin/sacct_Linux_x86_64.tar.gz
          mv ./sacct /usr/local/bin/sacct
          chmod 755 /usr/local/bin/sacct

          gh release download "squeue/v0.2.1" -R a2-ai-tech-training/slurm-mocks -p "*Linux_x86_64.tar.gz" -D /usr/local/bin/
          tar -xvf /usr/local/bin/squeue_Linux_x86_64.tar.gz
          mv ./squeue /usr/local/bin/squeue
          chmod 755 /usr/local/bin/squeue

          gh release download "sbatch/v0.2.0" -R a2-ai-tech-training/slurm-mocks -p "*Linux_x86_64.tar.gz" -D /usr/local/bin/
          tar -xvf /usr/local/bin/sbatch_Linux_x86_64.tar.gz
          mv ./sbatch /usr/local/bin/sbatch
          chmod 755 /usr/local/bin/sbatch

          echo "/usr/local/bin" >> $GITHUB_PATH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: a2-ai/setup-rv@main

      - name: replace-rversion
        run: |
          perl -i -pe 's|^r_version = "4\.[0-9\.]+"$|r_version = "${{ matrix.config.r }}"|' rproject.toml
          cat rproject.toml
        if: runner.os != 'Windows'

      - name: replace-rversion (Windows)
        run: |
          $rVersion = "${{ matrix.config.r }}"
          (Get-Content rproject.toml) -replace '^r_version = "4\.[0-9\.]+"$', "r_version = `"$rVersion`"" | Set-Content rproject.toml
          Get-Content rproject.toml
        shell: pwsh
        if: runner.os == 'Windows'

      - name: rv-plan
        run: rv plan
        if: runner.os != 'Windows'

      - name: rv-plan (Windows)
        run: rv.exe plan
        shell: cmd
        if: runner.os == 'Windows'
      - name: rv-sysdeps-install (Linux)
        if: runner.os == 'Linux'
        run: |
          MISSING_DEPS=$(rv plan --json | jq -r '.installed[].sys_deps[]? | select(.status == "absent") | .name')
          if [ -n "$MISSING_DEPS" ]; then
            echo "Found missing system dependencies:"
            echo "$MISSING_DEPS"
            echo "Installing..."
            echo "$MISSING_DEPS" | xargs sudo apt install
          else
            echo "All system dependencies are present"
          fi
      - name: rv-sync
        run: rv sync
        if: runner.os != 'Windows'

      - name: rv-sync (Windows)
        run: rv.exe sync
        shell: cmd
        if: runner.os == 'Windows'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
